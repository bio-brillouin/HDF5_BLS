name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Install local packages in order of dependencies (HDF5_BLS is the base)
        pip install -e packages/HDF5_BLS
        pip install -e packages/HDF5_BLS_analyse
        pip install -e packages/HDF5_BLS_treat
        # GUI package might have complex dependencies (PySide6/PyQt6), 
        # but we install it to ensure its environment is valid even if we don't run GUI tests yet.
        pip install -e packages/HDF5_BLS_GUI

    - name: Run HDF5_BLS tests
      run: |
        pytest packages/HDF5_BLS/tests

    - name: Run HDF5_BLS_analyse tests
      run: |
        pytest packages/HDF5_BLS_analyse/tests

    - name: Run HDF5_BLS_treat tests
      run: |
        pytest packages/HDF5_BLS_treat/tests
