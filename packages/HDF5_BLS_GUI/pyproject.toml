[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "HDF5_BLS_GUI"
version = "1.0.0"
description = "Graphical User Interface application for HDF5_BLS project."
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "GPLv3" }
authors = [
  { name = "Pierre Bouvet", email = "pierre.bouvet@meduniwien.ac.at" }
]
maintainers = [
  { name = "Pierre Bouvet", email = "pierre.bouvet@meduniwien.ac.at" }
]
requires-python = ">=3.6"
keywords = ["HDF5", "Brillouin", "BLS", "GUI"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: GNU General Public License v3 (GPLv3)",
  "Operating System :: OS Independent",
]

# CRITICAL: Lists all three packages as dependencies
dependencies = [
  "HDF5_BLS>=1.0.2",
  "HDF5_BLS_analyse>=1.0.0",
  "HDF5_BLS_treat>=1.0.0",
  "PyQt6", # Example GUI library (Replace with your actual GUI framework like PySide6, etc.)
  "matplotlib", # Needed for plotting within the GUI
]

[project.urls]
"Homepage" = "https://github.com/bio-brillouin/HDF5_BLS"
"Documentation" = "https://hdf5-bls.readthedocs.io/en/latest/"

# --- SETUPLOOLS CONFIGURATION FOR SRC LAYOUT ---
[tool.setuptools]
include-package-data = true
packages = ["HDF5_BLS_GUI", "HDF5_BLS_GUI.Main", "HDF5_BLS_GUI.DataProcessing", "HDF5_BLS_GUI.MessageBox_multiple_choice"]

[tool.setuptools.package-dir]
"HDF5_BLS_GUI" = "src"
"HDF5_BLS_GUI.Main" = "src/Main"
"HDF5_BLS_GUI.DataProcessing" = "src/DataProcessing"
"HDF5_BLS_GUI.MessageBox_multiple_choice" = "src/MessageBox_multiple_choice"

# --- ENTRY POINT for the GUI ---
# This defines the command that launches your GUI.
# Assuming your launch file is src/app.py and the entry function is 'main'.
[project.gui-scripts]
HDF5-BLS-GUI = "HDF5_BLS_GUI.app:main"